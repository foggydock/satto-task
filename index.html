<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="サッとタスク">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>サッとタスク</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #1a1d25;
    --surface-2: #232733;
    --line: #2e3340;
    --text: #e8eaf0;
    --text-dim: #9aa0ad;
    --accent: #4f8cff;
    --accent-press: #3d72d6;
    --urgent: #ff5c5c;
    --important: #ffb020;
    --done: #3ecf8e;
    --radius: 14px;
    --tap: 52px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 40px;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 14px; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(15,17,21,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 12px 0 10px;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  h1 { font-size: 20px; margin: 0; font-weight: 700; letter-spacing: .02em; }
  .tabs { display: flex; gap: 8px; margin-top: 12px; }
  .tab {
    flex: 1; height: 40px; border: none; border-radius: 10px;
    background: var(--surface); color: var(--text-dim);
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .count-badge {
    display: inline-block; min-width: 20px; padding: 0 6px; margin-left: 6px;
    font-size: 12px; line-height: 18px; border-radius: 9px;
    background: rgba(255,255,255,0.18);
  }

  /* Quick add */
  .composer { margin: 14px 0; }
  .title-field { position: relative; }
  .title-field input {
    width: 100%; height: var(--tap); padding: 0 16px;
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: var(--radius); color: var(--text); font-size: 17px;
  }
  .title-field input:focus { outline: none; border-color: var(--accent); }

  /* Suggestions */
  .suggest {
    position: absolute; left: 0; right: 0; top: calc(var(--tap) + 6px); z-index: 30;
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,.45);
  }
  .suggest-item {
    padding: 13px 16px; font-size: 16px; cursor: pointer;
    border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:active { background: var(--accent); color: #fff; }
  .suggest-item .ico { color: var(--text-dim); font-size: 14px; }

  .row2 { margin-top: 10px; }
  .date-field {
    display: flex; align-items: center; gap: 10px;
    height: var(--tap); padding: 0 12px 0 16px;
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: var(--radius); cursor: pointer;
  }
  .date-field:focus-within { border-color: var(--accent); }
  .date-cap { color: var(--text-dim); font-size: 15px; white-space: nowrap; }
  .date-cap .opt { font-size: 13px; opacity: .75; }
  .date-field input[type=date] {
    flex: 1; min-width: 0; height: 100%; padding: 0;
    background: transparent; border: none; color: var(--text);
    font-size: 16px; text-align: right;
  }
  .date-field input[type=date]:focus { outline: none; }
  /* 空のときは右側の年/月/日プレースホルダを隠してスッキリ見せる */
  .date-field.noval input[type=date] { color: transparent; }
  .date-clear {
    display: none; flex-shrink: 0; width: 30px; height: 30px;
    border: none; border-radius: 50%; background: var(--surface-2);
    color: var(--text-dim); font-size: 20px; line-height: 1; cursor: pointer;
    align-items: center; justify-content: center;
  }
  .date-field:not(.noval) .date-clear { display: flex; }

  /* クイック日付チップ */
  .chips { display: flex; gap: 8px; margin-top: 10px; }
  .chip {
    flex: 1; height: 42px; border-radius: 10px;
    border: 1.5px solid var(--line); background: var(--surface);
    color: var(--text-dim); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .chip.on { border-color: var(--accent); color: var(--accent); background: rgba(79,140,255,.12); }

  .flags { display: flex; gap: 8px; margin-top: 10px; }
  .flag {
    flex: 1; height: var(--tap); border-radius: var(--radius);
    border: 1.5px solid var(--line); background: var(--surface);
    color: var(--text-dim); font-size: 15px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    cursor: pointer; user-select: none;
  }
  .flag .box {
    width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--text-dim);
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .flag.on.urgent { border-color: var(--urgent); color: var(--urgent); background: rgba(255,92,92,.10); }
  .flag.on.urgent .box { border-color: var(--urgent); background: var(--urgent); color:#fff; }
  .flag.on.important { border-color: var(--important); color: var(--important); background: rgba(255,176,32,.10); }
  .flag.on.important .box { border-color: var(--important); background: var(--important); color:#1a1d25; }

  .add-btn {
    width: 100%; height: var(--tap); margin-top: 10px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); font-size: 17px; font-weight: 700; cursor: pointer;
  }
  .add-btn:active { background: var(--accent-press); }
  .add-btn:disabled { opacity: .45; }

  /* List */
  .list { margin-top: 8px; }
  .group-label {
    font-size: 12px; font-weight: 700; color: var(--text-dim);
    letter-spacing: .08em; margin: 18px 4px 8px; text-transform: uppercase;
  }
  .card {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    position: relative; overflow: hidden;
  }
  .card.has-deadline::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--accent);
  }
  .card.overdue::before { background: var(--urgent); }
  .card.soon::before { background: var(--important); }

  .check {
    flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid var(--text-dim); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: transparent; font-size: 16px; margin-top: 1px; transition: all .15s;
  }
  .check:active { transform: scale(.88); }
  .card.done-anim .check { border-color: var(--done); background: var(--done); color:#fff; }

  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 16.5px; font-weight: 600; word-break: break-word; }
  .card.archived .card-title { text-decoration: line-through; color: var(--text-dim); }
  .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; align-items: center; }
  .pill {
    font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .pill.urgent { background: rgba(255,92,92,.15); color: var(--urgent); }
  .pill.important { background: rgba(255,176,32,.15); color: var(--important); }
  .pill.deadline { background: rgba(79,140,255,.15); color: var(--accent); }
  .pill.deadline.overdue { background: rgba(255,92,92,.18); color: var(--urgent); }
  .pill.deadline.soon { background: rgba(255,176,32,.18); color: var(--important); }
  .created { font-size: 12px; color: var(--text-dim); }

  .del-btn {
    flex-shrink: 0; background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 4px 6px; align-self: center;
  }
  .restore-btn {
    flex-shrink: 0; background: var(--surface-2); border: 1px solid var(--line);
    color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer;
    padding: 8px 12px; border-radius: 10px; align-self: center;
  }

  .empty {
    text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: 15px;
  }
  .empty .big { font-size: 40px; margin-bottom: 12px; }

  .archive-tools { display: flex; justify-content: flex-end; margin: 6px 4px; }
  .clear-btn {
    background: none; border: 1px solid var(--line); color: var(--text-dim);
    font-size: 13px; padding: 7px 12px; border-radius: 9px; cursor: pointer;
  }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(120%);
    background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
    padding: 12px 16px; border-radius: 12px; font-size: 14px; z-index: 50;
    box-shadow: 0 10px 30px rgba(0,0,0,.5); transition: transform .25s; max-width: 90%;
    display: flex; align-items: center; gap: 12px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast button {
    background: var(--accent); border: none; color: #fff; font-weight: 700;
    padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
  }

  /* タップで編集できることを示すヒント */
  .card-body.editable { cursor: pointer; }

  /* 編集シート（下からスライドするモーダル） */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.55);
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-backdrop.show { display: flex; }
  .sheet {
    width: 100%; max-width: 560px; background: var(--surface);
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    border: 1px solid var(--line); border-bottom: none;
    padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
    animation: sheetUp .2s ease;
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet h2 { font-size: 17px; margin: 4px 2px 14px; font-weight: 700; }
  .sheet .title-field input { font-size: 17px; }
  .sheet .row2, .sheet .flags { margin-top: 10px; }
  .sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-cancel {
    flex: 1; height: var(--tap); border-radius: var(--radius);
    border: 1.5px solid var(--line); background: var(--surface-2);
    color: var(--text); font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .btn-save {
    flex: 2; height: var(--tap); border-radius: var(--radius); border: none;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .btn-save:active { background: var(--accent-press); }
  .btn-save:disabled { opacity: .45; }
  .btn-delete-row {
    width: 100%; margin-top: 14px; background: none; border: none;
    color: var(--urgent); font-size: 14px; padding: 8px; cursor: pointer;
  }

  /* メニュー（バックアップ・復元） */
  .menu-btn {
    background: none; border: none; font-size: 22px; line-height: 1;
    padding: 4px 6px; cursor: pointer;
  }
  .sheet-note { color: var(--text-dim); font-size: 13px; line-height: 1.7; margin: 0 2px 16px; }
  .btn-restore {
    width: 100%; height: var(--tap); margin-top: 10px; border-radius: var(--radius);
    border: 1.5px solid var(--line); background: var(--surface-2);
    color: var(--text); font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .btn-close {
    width: 100%; margin-top: 12px; background: none; border: none;
    color: var(--text-dim); font-size: 14px; padding: 8px; cursor: pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-row">
      <h1>⚡ サッとタスク</h1>
      <button class="menu-btn" onclick="openMenu()" aria-label="バックアップ・復元">⚙️</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabActive" onclick="switchTab('active')">
        やること<span class="count-badge" id="cntActive">0</span>
      </button>
      <button class="tab" id="tabArchive" onclick="switchTab('archive')">
        完了済み<span class="count-badge" id="cntArchive">0</span>
      </button>
    </div>
  </header>

  <!-- Composer -->
  <div class="composer" id="composer">
    <div class="title-field">
      <input type="text" id="titleInput" placeholder="やることを入力…" autocomplete="off"
             oninput="onTitleInput()" onkeydown="if(event.key==='Enter')addTask()">
      <div class="suggest" id="suggestBox" style="display:none"></div>
    </div>

    <div class="chips" id="dateChips">
      <button type="button" class="chip" data-chip="today" onclick="setQuickDate('today')">今日</button>
      <button type="button" class="chip" data-chip="tomorrow" onclick="setQuickDate('tomorrow')">明日</button>
      <button type="button" class="chip" data-chip="weekend" onclick="setQuickDate('weekend')">今週末</button>
    </div>
    <div class="row2">
      <label class="date-field noval" id="dateField" for="dateInput">
        <span class="date-cap">📅 締め切り日<span class="opt">（任意）</span></span>
        <input type="date" id="dateInput" onchange="onDateChange()">
        <button type="button" class="date-clear" id="dateClear" onclick="clearDate(event)" aria-label="締め切りを消す">×</button>
      </label>
    </div>

    <div class="flags">
      <div class="flag urgent" id="flagUrgent" onclick="toggleFlag('urgent')">
        <span class="box">✓</span>緊急
      </div>
      <div class="flag important" id="flagImportant" onclick="toggleFlag('important')">
        <span class="box">✓</span>重要
      </div>
    </div>

    <button class="add-btn" id="addBtn" onclick="addTask()" disabled>追加する</button>
  </div>

  <!-- List -->
  <div class="list" id="list"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 編集シート -->
<div class="modal-backdrop" id="editBackdrop" onclick="closeEditIfBackdrop(event)">
  <div class="sheet">
    <h2>タスクを編集</h2>
    <div class="title-field">
      <input type="text" id="editTitle" placeholder="やること" autocomplete="off" oninput="onEditTitleInput()">
    </div>
    <div class="chips" id="editDateChips">
      <button type="button" class="chip" data-chip="today" onclick="setEditQuickDate('today')">今日</button>
      <button type="button" class="chip" data-chip="tomorrow" onclick="setEditQuickDate('tomorrow')">明日</button>
      <button type="button" class="chip" data-chip="weekend" onclick="setEditQuickDate('weekend')">今週末</button>
    </div>
    <div class="row2">
      <label class="date-field noval" id="editDateField" for="editDate">
        <span class="date-cap">📅 締め切り日<span class="opt">（任意）</span></span>
        <input type="date" id="editDate" onchange="editDateChange()">
        <button type="button" class="date-clear" id="editDateClear" onclick="clearEditDate(event)" aria-label="締め切りを消す">×</button>
      </label>
    </div>
    <div class="flags">
      <div class="flag urgent" id="editFlagUrgent" onclick="toggleEditFlag('urgent')">
        <span class="box">✓</span>緊急
      </div>
      <div class="flag important" id="editFlagImportant" onclick="toggleEditFlag('important')">
        <span class="box">✓</span>重要
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="btn-save" id="editSaveBtn" onclick="saveEdit()">保存する</button>
    </div>
    <button class="btn-delete-row" onclick="deleteFromEdit()">🗑 このタスクを削除</button>
  </div>
</div>

<!-- バックアップ・復元シート -->
<div class="modal-backdrop" id="menuBackdrop" onclick="closeMenuIfBackdrop(event)">
  <div class="sheet">
    <h2>バックアップ / 復元</h2>
    <p class="sheet-note">
      タスクはこの端末の中だけに保存されています。ときどき書き出して保存しておくと、<br>
      アプリの入れ直しや機種変更でも元に戻せます。
    </p>
    <button class="add-btn" onclick="exportData()">↑ バックアップを書き出す</button>
    <button class="btn-restore" onclick="triggerImport()">↓ ファイルから復元する</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importData(event)">
    <button class="btn-close" onclick="closeMenu()">閉じる</button>
  </div>
</div>

<script>
/* ---------- データ層 ---------- */
const KEY = 'sat_task_v1';
let state = { tasks: [] };   // {id,title,deadline(YYYY-MM-DD|null),urgent,important,createdAt,archivedAt|null}
let currentTab = 'active';
let flags = { urgent: false, important: false };

function load() {
  try { state = JSON.parse(localStorage.getItem(KEY)) || { tasks: [] }; }
  catch { state = { tasks: [] }; }
  if (!Array.isArray(state.tasks)) state.tasks = [];
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

/* ---------- 日付ユーティリティ ---------- */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysUntil(dateStr) {
  const t = new Date(todayStr()+'T00:00:00');
  const d = new Date(dateStr+'T00:00:00');
  return Math.round((d - t) / 86400000);
}
function fmtCreated(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} 入力`;
}
function fmtDeadline(dateStr) {
  const n = daysUntil(dateStr);
  const d = new Date(dateStr+'T00:00:00');
  const md = `${d.getMonth()+1}/${d.getDate()}`;
  if (n < 0)  return `${md}（${-n}日超過）`;
  if (n === 0) return `${md}（今日）`;
  if (n === 1) return `${md}（明日）`;
  return `${md}（あと${n}日）`;
}

/* ---------- 入力フォーム ---------- */
function onTitleInput() {
  const v = document.getElementById('titleInput').value;
  document.getElementById('addBtn').disabled = v.trim() === '';
  renderSuggest(v);
}
function toggleFlag(type) {
  flags[type] = !flags[type];
  document.getElementById(type === 'urgent' ? 'flagUrgent' : 'flagImportant')
    .classList.toggle('on', flags[type]);
}
function onDateChange() {
  const f = document.getElementById('dateField');
  f.classList.toggle('noval', !document.getElementById('dateInput').value);
  syncChips('dateInput', 'dateChips');
}
function clearDate(e) {
  e.preventDefault();
  document.getElementById('dateInput').value = '';
  document.getElementById('dateField').classList.add('noval');
  syncChips('dateInput', 'dateChips');
}

/* ---------- クイック日付チップ ---------- */
function quickDateValue(kind) {
  const d = new Date(todayStr() + 'T00:00:00');
  if (kind === 'tomorrow') d.setDate(d.getDate() + 1);
  else if (kind === 'weekend') {
    const dow = d.getDay(); // 0=日, 6=土
    if (dow !== 6 && dow !== 0) d.setDate(d.getDate() + (6 - dow)); // 今度の土曜
  }
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function syncChips(inputId, chipsId) {
  const val = document.getElementById(inputId).value;
  document.getElementById(chipsId).querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('on', !!val && val === quickDateValue(c.getAttribute('data-chip')));
  });
}
function applyQuickDate(kind, inputId, fieldId, chipsId) {
  const input = document.getElementById(inputId);
  const val = quickDateValue(kind);
  input.value = (input.value === val) ? '' : val; // 同じチップ再タップで解除
  document.getElementById(fieldId).classList.toggle('noval', !input.value);
  syncChips(inputId, chipsId);
}
function setQuickDate(kind)     { applyQuickDate(kind, 'dateInput', 'dateField', 'dateChips'); }
function setEditQuickDate(kind) { applyQuickDate(kind, 'editDate', 'editDateField', 'editDateChips'); }

/* ---------- 編集シート ---------- */
let editingId = null;
let editFlags = { urgent: false, important: false };

function openEdit(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('editTitle').value = t.title;
  document.getElementById('editSaveBtn').disabled = false;
  const di = document.getElementById('editDate');
  di.value = t.deadline || '';
  document.getElementById('editDateField').classList.toggle('noval', !t.deadline);
  syncChips('editDate', 'editDateChips');
  editFlags = { urgent: !!t.urgent, important: !!t.important };
  document.getElementById('editFlagUrgent').classList.toggle('on', editFlags.urgent);
  document.getElementById('editFlagImportant').classList.toggle('on', editFlags.important);
  hideSuggest();
  document.getElementById('editBackdrop').classList.add('show');
}
function onEditTitleInput() {
  document.getElementById('editSaveBtn').disabled =
    document.getElementById('editTitle').value.trim() === '';
}
function toggleEditFlag(type) {
  editFlags[type] = !editFlags[type];
  document.getElementById(type === 'urgent' ? 'editFlagUrgent' : 'editFlagImportant')
    .classList.toggle('on', editFlags[type]);
}
function editDateChange() {
  document.getElementById('editDateField')
    .classList.toggle('noval', !document.getElementById('editDate').value);
  syncChips('editDate', 'editDateChips');
}
function clearEditDate(e) {
  e.preventDefault();
  document.getElementById('editDate').value = '';
  document.getElementById('editDateField').classList.add('noval');
  syncChips('editDate', 'editDateChips');
}
function saveEdit() {
  const t = state.tasks.find(x => x.id === editingId);
  if (!t) { closeEdit(); return; }
  const title = document.getElementById('editTitle').value.trim();
  if (!title) return;
  t.title = title;
  t.deadline = document.getElementById('editDate').value || null;
  t.urgent = editFlags.urgent;
  t.important = editFlags.important;
  save();
  closeEdit();
  render();
}
function deleteFromEdit() {
  if (!confirm('このタスクを完全に削除しますか？')) return;
  state.tasks = state.tasks.filter(x => x.id !== editingId);
  save();
  closeEdit();
  render();
}
function closeEdit() {
  document.getElementById('editBackdrop').classList.remove('show');
  editingId = null;
}
function closeEditIfBackdrop(e) {
  if (e.target.id === 'editBackdrop') closeEdit();
}

/* ---------- バックアップ / 復元 ---------- */
function openMenu() { document.getElementById('menuBackdrop').classList.add('show'); }
function closeMenu() { document.getElementById('menuBackdrop').classList.remove('show'); }
function closeMenuIfBackdrop(e) { if (e.target.id === 'menuBackdrop') closeMenu(); }

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const a = document.createElement('a');
  a.href = url;
  a.download = `satto-task-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast(`バックアップを書き出しました（${state.tasks.length}件）`);
}

function triggerImport() { document.getElementById('importFile').click(); }
function importData(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      const tasks = Array.isArray(obj) ? obj : (obj && Array.isArray(obj.tasks) ? obj.tasks : null);
      if (!tasks) throw new Error('format');
      // 同じ id は重複させず、足りないものだけ追加（既存のタスクは消えない）
      const existing = new Set(state.tasks.map(t => t.id));
      let added = 0;
      for (const t of tasks) {
        if (t && t.id && typeof t.title === 'string' && !existing.has(t.id)) {
          state.tasks.push(t); existing.add(t.id); added++;
        }
      }
      save();
      render();
      closeMenu();
      showToast(added > 0 ? `復元しました（${added}件を追加）` : '追加するものはありませんでした');
    } catch (err) {
      alert('読み込めませんでした。書き出したバックアップファイル（.json）を選んでください。');
    } finally {
      e.target.value = '';
    }
  };
  reader.readAsText(file);
}

function addTask() {
  const input = document.getElementById('titleInput');
  const title = input.value.trim();
  if (!title) return;
  const deadline = document.getElementById('dateInput').value || null;
  state.tasks.push({
    id: Date.now() + '' + Math.floor(Math.random()*1000),
    title, deadline,
    urgent: flags.urgent, important: flags.important,
    createdAt: new Date().toISOString(),
    archivedAt: null
  });
  save();
  // フォームをリセット
  input.value = '';
  document.getElementById('dateInput').value = '';
  document.getElementById('dateField').classList.add('noval');
  syncChips('dateInput', 'dateChips');
  flags = { urgent: false, important: false };
  document.getElementById('flagUrgent').classList.remove('on');
  document.getElementById('flagImportant').classList.remove('on');
  document.getElementById('addBtn').disabled = true;
  hideSuggest();
  render();
  input.focus();
}

/* ---------- サジェスト（履歴からリアルタイム補完） ---------- */
function historyTitles() {
  // 過去に使ったタイトルを、よく使う順＆新しい順で重複なく
  const map = new Map(); // title -> {count, last}
  for (const t of state.tasks) {
    const key = t.title;
    const e = map.get(key) || { count: 0, last: 0 };
    e.count++;
    const ts = new Date(t.createdAt).getTime();
    if (ts > e.last) e.last = ts;
    map.set(key, e);
  }
  return [...map.entries()]
    .sort((a,b) => b[1].count - a[1].count || b[1].last - a[1].last)
    .map(e => e[0]);
}
function renderSuggest(q) {
  const box = document.getElementById('suggestBox');
  const query = q.trim().toLowerCase();
  if (!query) { hideSuggest(); return; }
  const matches = historyTitles()
    .filter(t => t.toLowerCase().includes(query) && t.toLowerCase() !== query)
    .slice(0, 5);
  if (matches.length === 0) { hideSuggest(); return; }
  box.innerHTML = matches.map(t =>
    `<div class="suggest-item" onmousedown="pickSuggest(event)" data-t="${escAttr(t)}">
       <span class="ico">↩</span>${escHtml(t)}
     </div>`).join('');
  box.style.display = 'block';
}
function pickSuggest(e) {
  e.preventDefault();
  const t = e.currentTarget.getAttribute('data-t');
  const input = document.getElementById('titleInput');
  input.value = t;
  document.getElementById('addBtn').disabled = false;
  hideSuggest();
  input.focus();
}
function hideSuggest() { document.getElementById('suggestBox').style.display = 'none'; }
document.addEventListener('click', (e) => {
  if (!e.target.closest('.title-field')) hideSuggest();
});

/* ---------- 完了 / 復元 / 削除 ---------- */
let lastArchived = null;
function completeTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  // チェックアニメ → 少し待ってアーカイブ
  const card = document.querySelector(`[data-card="${id}"]`);
  if (card) card.classList.add('done-anim');
  setTimeout(() => {
    t.archivedAt = new Date().toISOString();
    lastArchived = id;
    save();
    render();
    showToast('完了にしました', '元に戻す', () => restoreTask(id));
  }, 220);
}
function restoreTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  t.archivedAt = null;
  save();
  render();
  hideToast();
}
function deleteTask(id) {
  if (!confirm('このタスクを完全に削除しますか？')) return;
  state.tasks = state.tasks.filter(x => x.id !== id);
  save();
  render();
}
function clearArchive() {
  if (!confirm('完了済みをすべて削除しますか？（履歴のサジェストも消えます）')) return;
  state.tasks = state.tasks.filter(x => !x.archivedAt);
  save();
  render();
}

/* ---------- 並び替え ---------- */
// 緊急 > 重要 > その他。両方持ちは緊急扱いで最上位。
function priorityRank(t) {
  return (t.urgent ? 0 : 1) * 2 + (t.important ? 0 : 1);
}
function sortedActive() {
  const active = state.tasks.filter(t => !t.archivedAt);
  const withDl = active.filter(t => t.deadline)
    .sort((a,b) => a.deadline.localeCompare(b.deadline) ||
                   new Date(a.createdAt) - new Date(b.createdAt));
  // 締め切りなしは「緊急→重要→その他」、同じ優先度内は入力が古い順
  const noDl = active.filter(t => !t.deadline)
    .sort((a,b) => priorityRank(a) - priorityRank(b) ||
                   new Date(a.createdAt) - new Date(b.createdAt));
  return { withDl, noDl };
}
function sortedArchive() {
  return state.tasks.filter(t => t.archivedAt)
    .sort((a,b) => new Date(b.archivedAt) - new Date(a.archivedAt)); // 新しく完了した順
}

/* ---------- 描画 ---------- */
function deadlineClass(dateStr) {
  const n = daysUntil(dateStr);
  if (n < 0) return 'overdue';
  if (n <= 2) return 'soon';
  return '';
}
function cardHtml(t, archived) {
  const dlCls = t.deadline ? deadlineClass(t.deadline) : '';
  const cls = ['card'];
  if (archived) cls.push('archived');
  else if (t.deadline) { cls.push('has-deadline'); if (dlCls) cls.push(dlCls); }

  const pills = [];
  if (t.deadline) pills.push(`<span class="pill deadline ${dlCls}">📅 ${fmtDeadline(t.deadline)}</span>`);
  if (t.urgent)    pills.push(`<span class="pill urgent">🔥 緊急</span>`);
  if (t.important) pills.push(`<span class="pill important">⭐ 重要</span>`);

  const left = archived
    ? ''
    : `<button class="check" onclick="completeTask('${t.id}')" aria-label="完了">✓</button>`;
  const right = archived
    ? `<button class="restore-btn" onclick="restoreTask('${t.id}')">戻す</button>
       <button class="del-btn" onclick="deleteTask('${t.id}')" aria-label="削除">🗑</button>`
    : `<button class="del-btn" onclick="deleteTask('${t.id}')" aria-label="削除">🗑</button>`;

  const bodyOpen = archived
    ? `<div class="card-body">`
    : `<div class="card-body editable" onclick="openEdit('${t.id}')">`;

  return `<div class="${cls.join(' ')}" data-card="${t.id}">
    ${left}
    ${bodyOpen}
      <div class="card-title">${escHtml(t.title)}</div>
      <div class="meta">
        ${pills.join('')}
        <span class="created">${fmtCreated(t.createdAt)}</span>
      </div>
    </div>
    ${right}
  </div>`;
}

function render() {
  const active = state.tasks.filter(t => !t.archivedAt);
  const archive = state.tasks.filter(t => t.archivedAt);
  document.getElementById('cntActive').textContent = active.length;
  document.getElementById('cntArchive').textContent = archive.length;

  const list = document.getElementById('list');
  const composer = document.getElementById('composer');

  if (currentTab === 'active') {
    composer.style.display = '';
    const { withDl, noDl } = sortedActive();
    if (withDl.length + noDl.length === 0) {
      list.innerHTML = `<div class="empty"><div class="big">🎉</div>やることはありません</div>`;
      return;
    }
    let html = '';
    if (withDl.length) {
      html += `<div class="group-label">締め切りあり（近い順）</div>`;
      html += withDl.map(t => cardHtml(t, false)).join('');
    }
    if (noDl.length) {
      html += `<div class="group-label">締め切りなし（緊急→重要→その他）</div>`;
      html += noDl.map(t => cardHtml(t, false)).join('');
    }
    list.innerHTML = html;
  } else {
    composer.style.display = 'none';
    const arch = sortedArchive();
    if (arch.length === 0) {
      list.innerHTML = `<div class="empty"><div class="big">📭</div>完了済みはありません</div>`;
      return;
    }
    list.innerHTML =
      `<div class="archive-tools"><button class="clear-btn" onclick="clearArchive()">すべて削除</button></div>` +
      arch.map(t => cardHtml(t, true)).join('');
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabActive').classList.toggle('active', tab === 'active');
  document.getElementById('tabArchive').classList.toggle('active', tab === 'archive');
  hideSuggest();
  render();
}

/* ---------- Toast ---------- */
let toastTimer = null;
function showToast(msg, actionLabel, onAction) {
  const el = document.getElementById('toast');
  el.innerHTML = `<span>${escHtml(msg)}</span>`;
  if (actionLabel) {
    const b = document.createElement('button');
    b.textContent = actionLabel;
    b.onclick = () => { onAction && onAction(); };
    el.appendChild(b);
  }
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(hideToast, 4000);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

/* ---------- エスケープ ---------- */
function escHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escAttr(s){return s.replace(/"/g,'&quot;');}

/* ---------- 起動 ---------- */
load();
render();
</script>
